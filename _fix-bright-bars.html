<!DOCTYPE html>
<html>
<head>
    <title>Fix Bright Bar Grades - Bhavya Steel</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #1e3a8a; }
        .step { background: #f0f9ff; padding: 15px; margin: 15px 0; border-left: 4px solid #3b82f6; }
        button { background: #ea580c; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 5px; }
        button:hover { background: #c2410c; }
        #output { background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; }
        .success { color: #059669; font-weight: bold; }
        .error { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔧 Fix Bright Bar Grades Tool</h1>
    <p>This tool will automatically change "Grade: EN8, C45" to "Grade: Polished" ONLY in the 4 Bright Bar products.</p>
    
    <div class="step">
        <h3>Step 1: Fetch Current File</h3>
        <button onclick="fetchFile()">Fetch index.html from GitHub</button>
        <div id="fetchStatus"></div>
    </div>
    
    <div class="step">
        <h3>Step 2: Preview Changes</h3>
        <button onclick="previewChanges()" id="previewBtn" disabled>Preview Changes</button>
        <div id="previewStatus"></div>
    </div>
    
    <div class="step">
        <h3>Step 3: Download Fixed File</h3>
        <button onclick="downloadFixed()" id="downloadBtn" disabled>Download Fixed index.html</button>
        <p style="font-size: 14px; color: #64748b;">Then manually upload this file to GitHub to replace the current index.html</p>
    </div>
    
    <div id="output"></div>
    
    <script>
        let originalContent = '';
        let fixedContent = '';
        
        async function fetchFile() {
            const status = document.getElementById('fetchStatus');
            const output = document.getElementById('output');
            status.innerHTML = 'Fetching...';
            output.innerHTML = '';
            
            try {
                const response = await fetch('https://raw.githubusercontent.com/kapasiraj84-beep/bhavya-steel-industries/main/index.html');
                originalContent = await response.text();
                
                status.innerHTML = '<span class="success">✓ File fetched successfully! (' + originalContent.length + ' characters)</span>';
                document.getElementById('previewBtn').disabled = false;
                output.innerHTML = 'File loaded. Ready to preview changes.';
            } catch (error) {
                status.innerHTML = '<span class="error">✗ Error: ' + error.message + '</span>';
                output.innerHTML = 'Error details: ' + error;
            }
        }
        
        function previewChanges() {
            const status = document.getElementById('previewStatus');
            const output = document.getElementById('output');
            
            // Find and replace ONLY in Bright Bar sections
            // We need to be surgical - only replace in the 4 Bright Bar products
            
            let changes = [];
            let tempContent = originalContent;
            
            // Strategy: Find each Bright Bar product section and replace within it
            const brightBarSections = [
                'MS Bright Round Bars',
                'MS Bright Flat Bars',
                'MS Bright Square Bars',
                'MS Bright Hexagon Bars'
            ];
            
            brightBarSections.forEach(productName => {
                // Find the product section
                const productIndex = tempContent.indexOf('<h3>' + productName + '</h3>');
                if (productIndex !== -1) {
                    // Find the next product card end (or end of products section)
                    const sectionStart = tempContent.lastIndexOf('<div class="product-card">', productIndex);
                    const sectionEnd = tempContent.indexOf('</div>\n                </div>\n\n                <div class="product-card">', productIndex);
                    
                    if (sectionStart !== -1) {
                        const endPos = sectionEnd !== -1 ? sectionEnd + 50 : tempContent.indexOf('</section>', productIndex);
                        const section = tempContent.substring(sectionStart, endPos);
                        
                        // Check if this section has "Grade: EN8, C45"
                        if (section.includes('<li>Grade: EN8, C45</li>')) {
                            const fixedSection = section.replace('<li>Grade: EN8, C45</li>', '<li>Grade: Polished</li>');
                            tempContent = tempContent.substring(0, sectionStart) + fixedSection + tempContent.substring(endPos);
                            changes.push('✓ Fixed: ' + productName);
                        }
                    }
                }
            });
            
            fixedContent = tempContent;
            
            if (changes.length > 0) {
                status.innerHTML = '<span class="success">✓ Changes previewed successfully!</span>';
                output.innerHTML = 'Changes made:\n\n' + changes.join('\n') + '\n\nTotal: ' + changes.length + ' products updated';
                document.getElementById('downloadBtn').disabled = false;
            } else {
                status.innerHTML = '<span class="error">✗ No changes found. File may already be updated.</span>';
                output.innerHTML = 'No "Grade: EN8, C45" found in Bright Bar sections.';
            }
        }
        
        function downloadFixed() {
            const blob = new Blob([fixedContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            document.getElementById('output').innerHTML = '✓ File downloaded! Now:\n\n1. Go to GitHub repository\n2. Click on index.html\n3. Click "Edit" (pencil icon)\n4. Delete all content\n5. Open the downloaded file in a text editor\n6. Copy all content\n7. Paste into GitHub editor\n8. Commit changes\n\nOR use GitHub Desktop/Git to replace the file.';
        }
    </script>
</body>
</html>
