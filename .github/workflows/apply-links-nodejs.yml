name: Apply Links (Node.js)

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run script
        run: node add-links.js
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🗺️ ADD: Clickable Google Maps links

          Minimal changes - wrapped addresses in <a> tags:
          • Contact section address → clickable
          • GST section address → clickable
          • Footer location → clickable
          
          Opens Google Maps with directions to:
          Satguru Swami Teoonramji Maharaj Overbridge, Naroda, Ahmedabad"
      
      - name: Push
        run: git push
