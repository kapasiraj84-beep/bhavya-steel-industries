name: Restore Clean Version

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Fetch clean version of index.html
        run: |
          curl -o index.html https://raw.githubusercontent.com/kapasiraj84-beep/bhavya-steel-industries/bee24d5a784d8778501e8d32524c5312b281f405/index.html
          
      - name: Commit restored file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "🔄 RESTORE: Clean version of index.html (before Google Maps changes)"
          git push
