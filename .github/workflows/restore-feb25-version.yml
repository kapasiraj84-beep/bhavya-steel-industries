name: Restore Feb 25 Version

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Download and restore Feb 25 version
        run: |
          curl -L "https://github.com/kapasiraj84-beep/bhavya-steel-industries/raw/9f5c54d8ad4a69b6d14e32f15014fe60bcc7ff47/index.html" -o index.html
          git add index.html
          git commit -m "🔄 RESTORE: Complete Feb 25 website (before all today's changes)"
          git push
