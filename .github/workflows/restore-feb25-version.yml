name: Restore Feb 25 Version

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Restore index.html from Feb 25
        run: |
          git show bee24d5a784d8778501e8d32524c5312b281f405:index.html > index.html
          git add index.html
          git commit -m "🔄 RESTORE: Complete Feb 25 website (before all today's changes)"
          git push
